# Main Configuration for Swin-Mamba SupResDiffGAN
mode: 'train-test' # Executes training followed by a full evaluation suite
use_perceptual_loss: true # Enables LPIPS perceptual loss

model:
  name: 'SupResDiffGAN_Hybrid' # Triggers the HybridUNet with Mamba bottleneck
  lr: 0.000005 # Optimized lower learning rate for SSM stability
  alfa_perceptual: 0.001 # Weight for LPIPS/VGG feature matching
  alfa_adv: 0.008 # Weight for the relativistic GAN loss
  load_model: null

trainer:
  max_epochs: 50 #
  max_steps: -1 
  check_val_every_n_epoch: 5 #
  limit_val_batches: 0.25 # Validates on 25% of the validation set to save time
  log_every_n_steps: 5 #
  precision: '16-mixed' # Uses mixed-precision for faster throughput on NVIDIA GPUs
  accumulate_grad_batches: 8 # Virtual batch size becomes 32 (4*8)
  gradient_clip_val: 1.0
  accelerator: 'gpu' #
  devices: 1
  resume_from_checkpoint: 'models/checkpoints/last.ckpt' # Set to path if resuming training

dataset:
  name: 'celeb' # Uses the CelebA dataset
  batch_size: 4 #
  resize: true
  scale: 4 # 4x Super-Resolution factor

evaluation:
  mode: 'all' # Evaluates across all steps and posteriors
  steps: [50, 100, 200] # Inference steps for evaluation
  posteriors: ['ddpm', 'ddim'] #
  save_results: true
  results_file: 'evaluation_results/final_evaluation.csv' #

checkpoint:
  monitor: 'val/LPIPS' # Primary metric for saving the best model
  dirpath: 'models/checkpoints/' #
  save_top_k: 1
  mode: 'min'
  save_last: true # Saves last.ckpt for resuming
  filename: 'SupResDiffGAN-{epoch:02d}-{val/LPIPS:.4f}' #

autoencoder: 'VAE' # Uses the VAE for latent space projection
feature_extractor: true # Uses the optimized feature extractor for perceptual loss

unet: # Channels for the Hybrid Swin-Mamba UNet
  - 64
  - 96
  - 128
  - 256 # Mamba bottleneck applied at this depth

diffusion:
  timesteps: 500 # Total diffusion steps
  beta_type: 'cosine' #
  posterior_type: 'ddpm' #
  validation_timesteps: 100 # Faster validation using 100 steps
  validation_posterior_type: 'ddim' # Uses DDIM for accelerated validation

discriminator:
  in_channels: 6 # Concatenated SR/HR and LR features
  channels:
    - 64
    - 128
    - 256

wandb:
  project: 'SupResDiffGAN' #
  entity: 'samarthya04-kiit-deemed-to-be-university' #