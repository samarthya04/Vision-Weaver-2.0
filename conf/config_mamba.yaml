# ==============================================================================
# Hi-MambaSR: Hierarchical State-Space Refinement for Latent Diffusion SR
# High-Throughput Research Configuration | Target: LPIPS 0.210
# ==============================================================================

mode: 'train' 
use_perceptual_loss: true 

model:
  name: 'Hi-MambaSR'
  lr: 2.0e-6                  # Compensates for larger effective batch size
  alfa_perceptual: 0.04    
  alfa_adv: 0.004              
  load_model: 'models/checkpoints/last.ckpt' # Loads pre-architecture-fix weights (strict=False)

trainer:
  max_epochs: 50
  max_steps: -1
  check_val_every_n_epoch: 5    # Frequent validation to track Swin-Mamba stability
  limit_val_batches: 0.10       # Validate on 10% of data for rapid feedback
  log_every_n_steps: 10 
  # BF16 is significantly more stable for Mamba scanning than FP16
  precision: 'bf16-mixed'       
  accumulate_grad_batches: 16   # Increased to 16 to compensate for small 6GB VRAM physical batch size (4)
  gradient_clip_val: 1.0        # Synced with the Mamba stability fixes in train_model.py
  accelerator: 'gpu' 
  devices: 1
  benchmark: true               # Enable cudnn autotuner for fixed-size inputs
  resume_from_checkpoint: null  # Must be null to avoid crashing the Adam Optimizer on new RMSNorms

dataset:
  name: 'celeb'               
  batch_size: 4                 # Strictly reduced to 4 to prevent 6GB VRAM Out-of-Memory (OOM) crashes
  resize: true
  scale: 4                     

evaluation:
  mode: 'all'                  
  steps: [25, 50]               # Streamlined sampling steps for evaluation
  posteriors: ['ddim']          
  save_results: true
  results_file: 'evaluation_results/hi_mambasr_benchmarks.csv'

checkpoint:
  monitor: 'val/LPIPS'        
  dirpath: 'models/checkpoints/' 
  save_top_k: 2
  mode: 'min'
  save_last: true              
  filename: 'Hi-MambaSR-{epoch:02d}-{val/LPIPS:.4f}'

autoencoder: 'VAE'             
feature_extractor: true        

unet:                          
  - 64
  - 96
  - 128
  - 256                        

diffusion:
  timesteps: 1000              
  beta_type: 'cosine'          
  posterior_type: 'ddpm' 
  validation_timesteps: 25     
  validation_posterior_type: 'ddim'

discriminator:
  in_channels: 6               
  channels:
    - 64
    - 128
    - 256

wandb:
  project: 'Hi-MambaSR'        
  entity: 'samarthya04-kiit-deemed-to-be-university'
