# ==============================================================================
# Hi-MambaSR: Hierarchical State-Space Refinement for Latent Diffusion SR
# Fine-Tune Configuration | Pushing for LPIPS < 0.190
# Resuming from best perceptual checkpoint (epoch 14, LPIPS=0.2639)
# ==============================================================================

mode: 'train' 
use_perceptual_loss: true 

model:
  name: 'Hi-MambaSR'
  lr: 2e-5                    # Reduced for stable fine-tuning (was 5e-5)
  alfa_perceptual: 0.35       # Increased to drive LPIPS down harder (was 0.20)
                              # Higher weight = more emphasis on perceptual quality
  alfa_adv: 5e-4              # Keep low to prevent texture hallucinations
  load_model: 'models/checkpoints/last-v1.ckpt'

trainer:
  max_epochs: 50             # Extended for fine-tuning convergence
  max_steps: -1
  check_val_every_n_epoch: 3  # More frequent validation for metric tracking (was 5)
  limit_val_batches: 0.25     # 25% of val set for reliable PSNR/SSIM/LPIPS tracking
  log_every_n_steps: 10 
  precision: 'bf16-mixed'       
  accumulate_grad_batches: 16   # Effective batch = 2 × 16 = 32
  gradient_clip_val: 1.0        # Synced with the Mamba stability fixes in train_model.py
  accelerator: 'gpu' 
  devices: 1
  benchmark: true
  optimizer_8bit: true           # 8-bit Adam via bitsandbytes: ~75% optimizer state memory savings
  resume_from_checkpoint: 'models/checkpoints/last-v1.ckpt'        

dataset:
  name: 'celeb'               
  batch_size: 2                # Physical micro-batch; effective batch = 2 × 16 accumulation = 32
  resize: true
  scale: 4                     

evaluation:
  mode: 'all'                  
  steps: [25, 50]             
  posteriors: ['ddim']          
  save_results: true
  results_file: 'evaluation_results/hi_mambasr_benchmarks.csv'

checkpoint:
  monitor: 'val/LPIPS'        
  dirpath: 'models/checkpoints/' 
  save_top_k: 3               # Keep top 3 for post-hoc analysis
  mode: 'min'
  save_last: true              
  filename: 'Hi-MambaSR-{epoch:02d}-{val/LPIPS:.4f}'

autoencoder: 'VAE'             
feature_extractor: true        

unet:                          
  - 64
  - 96
  - 128
  - 256                        

diffusion:
  timesteps: 500              
  beta_type: 'cosine'          
  posterior_type: 'ddpm' 
  validation_timesteps: 50     # Increased from 25 for better inference quality
  validation_posterior_type: 'ddim'

discriminator:
  in_channels: 6               
  channels:
    - 64
    - 128
    - 256

wandb:
  project: 'Hi-MambaSR'        
  entity: 'samarthya04-kiit-deemed-to-be-university'
