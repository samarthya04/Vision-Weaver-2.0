# ==============================================================================
# Hi-MambaSR: Hierarchical State-Space Refinement for Latent Diffusion SR
# Fine-Tune Configuration v3 | Color Fidelity Fix + Balanced Perceptual Loss
# Resuming from epoch 23 checkpoint (LPIPS=0.2237, PSNR=21.26)
# Key changes: +color loss (RGB L1), reduced alfa_perceptual (0.55→0.40)
# ==============================================================================

mode: 'train' 
use_perceptual_loss: true 

model:
  name: 'Hi-MambaSR'
  lr: 2.5e-5                    # Increased for faster convergence to target
  alfa_perceptual: 0.45         # Reduced to prioritize PSNR recovery and stability
  alfa_adv: 1e-3                
  alfa_color: 0.15              # Increased to aggressively anchor color fidelity
  load_model: null

trainer:
  max_epochs: 60               # Extended for fine-tuning convergence
  max_steps: -1
  check_val_every_n_epoch: 3    # More frequent validation for metric tracking
  limit_val_batches: 0.25       # 25% of val set for reliable PSNR/SSIM/LPIPS tracking
  log_every_n_steps: 10 
  precision: 'bf16-mixed'       
  accumulate_grad_batches: 16   # Effective batch = 2 × 16 = 32
  gradient_clip_val: 1.0        # Synced with the Mamba stability fixes in train_model.py
  accelerator: 'gpu' 
  devices: 1
  benchmark: true
  optimizer_8bit: true           # 8-bit Adam via bitsandbytes: ~75% optimizer state memory savings
  resume_from_checkpoint: 'models/checkpoints/Hi-MambaSR-PSNR-epoch=23-val/PSNR=21.33.ckpt'
  
dataset:
  name: 'celeb'               
  batch_size: 2                # Physical micro-batch; effective batch = 2 × 16 accumulation = 32
  resize: true
  scale: 4                     

evaluation:
  mode: 'all'                  
  steps: [25, 50]             
  posteriors: ['ddim']          
  save_results: true
  results_file: 'evaluation_results/hi_mambasr_benchmarks.csv'

checkpoint:
  monitor: 'val/LPIPS'        
  dirpath: 'models/checkpoints/' 
  save_top_k: 3               # Keep top 3 for post-hoc analysis
  mode: 'min'
  save_last: true              
  filename: 'Hi-MambaSR-{epoch:02d}-{val/LPIPS:.4f}'

autoencoder: 'VAE'             
feature_extractor: true        

unet:                          
  - 64
  - 96
  - 128
  - 256                        

diffusion:
  timesteps: 500              
  beta_type: 'cosine'          
  posterior_type: 'ddpm' 
  validation_timesteps: 50     # Increased from 25 for better inference quality
  validation_posterior_type: 'ddim'

discriminator:
  in_channels: 6               
  channels:
    - 64
    - 128
    - 256

wandb:
  project: 'Hi-MambaSR'        
  entity: 'samarthya04-kiit-deemed-to-be-university'
